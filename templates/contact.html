<!DOCTYPE html>
<html>
<head>
<title>AI Support System</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
}

.container{
width:400px;
margin:80px auto;
padding:30px;
background:white;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Contact Support</h2>

<form id="contactForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<textarea id="message" placeholder="Enter your query"></textarea>

<button type="submit">Submit</button>

</form>

<p id="response"></p>

</div>
<script>
document.getElementById("contactForm").onsubmit = async function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const message = document.getElementById("message").value;

await fetch("/contact",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email,message:message})
});

alert("Message Sent!");
}
</script>

</body>

</html>
